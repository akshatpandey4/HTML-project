    <main>
        <div id="contact-info">
    <h2>Contact Us</h2>
    <p>For inquiries, you can reach us via email or phone:</p>
    <p><b>E-mail: restaurant@xyz.com</b></p>
    <p><b>Phone: +92 0123456789</b></p>
    <p>For any suggestion or feedback please fill the form</p>
        </div>
        
        <div id="feedback-form">        
    <form>
        <fieldset>
            <legend><b><b>Feedback Form</b></legend>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name">
        <br><br>
        <label for="email">E-mail:</label>
        <input type="email" id ="email" name="email">
        <br><br>

        <label for="feedback">Message:</label>
        <textarea name="feedback" id="feedback" name="feedback" value="feedback" cols="30" rows="10"
        ></textarea>
        <br><br>
        <button type="submit">Submit</button>
        
            </fieldset>
    </form>
    </main>
